<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>E-mail Verificado — Checklist</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#0a0a14;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
    .card{background:#f7f6fb;border-radius:20px;padding:48px 40px;width:100%;max-width:380px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
    .icon{font-size:3rem;margin-bottom:1rem}
    .ftitle{font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;color:#0d0d1a;letter-spacing:-.8px;margin-bottom:.5rem}
    .fsub{font-size:14px;color:#6b7280;line-height:1.6;margin-bottom:2rem}
    .btn{display:inline-block;padding:13px 32px;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;font-size:15px;font-weight:700;font-family:'Syne',sans-serif;text-decoration:none;box-shadow:0 4px 14px rgba(124,58,237,.35);transition:opacity .15s}
    .btn:hover{opacity:.93}
    .brand{display:flex;align-items:center;justify-content:center;gap:10px;font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:#0d0d1a;margin-bottom:2rem}
    .bmark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#7c3aed,#6d28d9);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff}
  </style>
</head>
<body>
<div class="card">
  <div class="brand"><div class="bmark">✓</div>Checklist</div>
  <div class="icon">✅</div>
  <div class="ftitle">E-mail verificado!</div>
  <div class="fsub">Sua conta foi confirmada com sucesso. Agora você pode fazer login normalmente.</div>
  <a href="/index.html" class="btn">Ir para o login</a>
</div>
</body>
</html>
