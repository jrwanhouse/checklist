# =============================================================================
# PR Automation - checklist
# Generated by AIOX *setup-github (Story 5.10)
# =============================================================================

name: PR Automation

on:
  pull_request:
    branches:
      - main
      - develop
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write

env:
  NODE_VERSION: '20'

jobs:
  # ===========================================================================
  # REQUIRED STATUS CHECKS (Blocking)
  # ===========================================================================

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install && cd backend && npm install

      - name: Run lint
        run: npm run lint --if-present || echo "⚠️ No lint script configured"

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      coverage-summary: ${{ steps.coverage.outputs.summary }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install && cd backend && npm install

      - name: Run tests
        id: test-run
        run: npm test --if-present || echo "⚠️ No test script configured"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false
        continue-on-error: true

      - name: Extract coverage summary
        id: coverage
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            LINES=$(jq '.total.lines.pct' coverage/coverage-summary.json)
            STATEMENTS=$(jq '.total.statements.pct' coverage/coverage-summary.json)
            BRANCHES=$(jq '.total.branches.pct' coverage/coverage-summary.json)
            FUNCTIONS=$(jq '.total.functions.pct' coverage/coverage-summary.json)
            echo "summary=Lines: ${LINES}% | Statements: ${STATEMENTS}% | Branches: ${BRANCHES}% | Functions: ${FUNCTIONS}%" >> $GITHUB_OUTPUT
          else
            echo "summary=Coverage report not available" >> $GITHUB_OUTPUT
          fi

  # ===========================================================================
  # QUALITY SUMMARY
  # ===========================================================================

  quality-summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()
    steps:
      - name: Generate quality summary
        uses: actions/github-script@v7
        with:
          script: |
            const lintResult = '${{ needs.lint.result }}';
            const testResult = '${{ needs.test.result }}';

            const getEmoji = (result) => {
              switch(result) {
                case 'success': return '✅';
                case 'failure': return '❌';
                case 'cancelled': return '⏹️';
                case 'skipped': return '⏭️';
                default: return '⏳';
              }
            };

            const allPassed = lintResult === 'success' && testResult === 'success';
            const overallStatus = allPassed ? '✅ All checks passed' : '❌ Some checks failed';

            const body = `## 📋 Quality Gate Summary

            **Overall Status:** ${overallStatus}

            | Check | Status |
            |-------|--------|
            | Lint | ${getEmoji(lintResult)} ${lintResult} |
            | Tests | ${getEmoji(testResult)} ${testResult} |

            ### CodeRabbit Review
            🐰 CodeRabbit will provide automated code review comments separately.

            ---
            *Generated by AIOX PR Automation*
            `;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('📋 Quality Gate Summary')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

  # ===========================================================================
  # CODERABBIT STATUS CHECK
  # ===========================================================================

  coderabbit-check:
    name: CodeRabbit Status
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()
    steps:
      - name: Checkout for config check
        uses: actions/checkout@v4
        with:
          sparse-checkout: .coderabbit.yaml
          sparse-checkout-cone-mode: false

      - name: Validate CodeRabbit config
        run: |
          if [ -f ".coderabbit.yaml" ]; then
            echo "✅ CodeRabbit configuration found"
          else
            echo "⚠️ CodeRabbit configuration not found"
          fi
