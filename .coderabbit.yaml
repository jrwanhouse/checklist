# =============================================================================
# CodeRabbit Configuration - checklist
# Generated by AIOX *setup-github (Story 5.10)
# Profile: assertive (balanced)
# Documentation: https://docs.coderabbit.ai/configuration
# =============================================================================

version: 2
language: "en-US"
early_access: false

reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  poem: false
  review_status: true
  collapse_walkthrough: false
  abort_on_close: true

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "main"
      - "develop"

  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: false

  path_filters:
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/coverage/**"
    - "!**/*.min.js"
    - "!**/*.min.css"
    - "!**/package-lock.json"
    - "!**/yarn.lock"

  path_instructions:
    - path: "backend/**/*.js"
      instructions: |
        Express.js backend code.

        CRITICAL (must fix immediately):
        - Hardcoded credentials or API keys
        - SQL injection vulnerabilities
        - Missing authentication/authorization checks
        - Exposed sensitive data in logs or responses

        HIGH (should fix before merge):
        - Missing input validation
        - Unhandled promise rejections
        - Missing error handling
        - Insecure JWT handling

        MEDIUM (document as tech debt):
        - Code duplication
        - Missing rate limiting
        - Inconsistent error responses

    - path: "backend/routes/**"
      instructions: |
        API route files.

        CRITICAL:
        - Missing auth middleware on protected routes
        - SQL injection via unparameterized queries
        - Missing input validation

        HIGH:
        - Inconsistent HTTP status codes
        - Missing pagination for list endpoints

    - path: "frontend/**"
      instructions: |
        Frontend static files.

        FOCUS ON:
        - XSS vulnerabilities
        - Exposed API keys or secrets
        - Insecure direct object references

    - path: "*.sql"
      instructions: |
        SQL files.

        CRITICAL:
        - Data loss potential (DROP without safeguards)
        - Missing rollback strategy

        HIGH:
        - Missing indexes for foreign keys

    - path: "*.config.*"
      instructions: |
        Configuration files.

        CRITICAL:
        - Hardcoded secrets or production credentials

    - path: ".env*"
      instructions: |
        Environment files.

        CRITICAL:
        - Real secrets committed (not just examples)

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: "auto"
  issues:
    scope: "auto"
  pull_requests:
    scope: "auto"
